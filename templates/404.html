<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <title>Benno Vertretungsplan</title>
    
    <script>
        setInterval(() => {
            location.reload();
        }, {{ cfg.updatecycle }} * 60 * 1000);
    </script>

</head>
<body>
    <div id="container">
        <h2 id="heading">{{ type(e).__name__ }}</h2>
        <p>{{ e }}</p>
    </div>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--secondary-text);
        }

        .heading {
            font-size: 40px;
            font-weight: 800;
            color: var(--background-embed);
            text-shadow: 2px 1px 1px rgba(0, 0, 0, 0.3), -2px -1px 1px rgba(255, 255, 255, 0.3);
        }

        .container {
            width: fit-content;
            min-width: 50vh;

            height: fit-content;
            min-height: 15vh;
            padding: 30px 60px;
            background-color: var(--background-embed);
            box-shadow: inset 18px 18px 20px var(--shadow), inset -18px -18px 20px #ffffff;
            border-radius: 20px;
        
            display: flex;
            flex-direction: column;
        
            justify-content: center;
            align-items: center;
        }
    </style>
</body>
</html>
