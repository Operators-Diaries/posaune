name: Deploy Live Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Installationsskript starten
        run: |
          curl -fsSL https://raw.githubusercontent.com/Operators-Diaries/posaune/main/scripts/install.sh -o install.sh
          chmod +x install.sh
          # Falls dein Installer eine GUI-/X11-Umgebung erwartet:
          nohup xvfb-run --auto-servernum ./install.sh > app.log 2>&1 &

      - name: Auf Seite warten
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "Website is live"
              exit 0
            fi
            echo "Waiting for website..."
            sleep 5
          done

          echo "Website did not become available in time"
          echo "---- app.log ----"
          tail -n 200 app.log || true
          exit 1

      - name: Playwright installieren
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Snapshot der Seite erstellen
        run: |
          mkdir -p snapshot/public

          cat << 'EOF' > capture.js
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              viewport: { width: 1440, height: 1600 }
            });

            await page.goto('http://127.0.0.1:5000/', {
              waitUntil: 'domcontentloaded',
              timeout: 60000
            });

            // Netzwerk beruhigen lassen; bei HTMX lieber zusätzlich einen festen Puffer
            try {
              await page.waitForLoadState('networkidle', { timeout: 15000 });
            } catch (_) {}

            await page.waitForTimeout(5000);

            // Optional: Wenn du ein zuverlässiges "fertig geladen"-Element hast,
            // hier eintragen und in der Aktion per env setzen.
            const loadedSelector = process.env.LOADED_SELECTOR;
            if (loadedSelector) {
              await page.waitForSelector(loadedSelector, { timeout: 30000 });
            }

            let content = await page.content();

            // Nur die häufigsten Root-Referenzen für lokale Pages anpassen.
            content = content
              .replace(/(src|href)="\/static\//g, '$1="static/')
              .replace(/url\("\/static\//g, 'url("static/')
              .replace(/url\('\/static\//g, "url('static/")
              .replace(/url\(\s*\/static\//g, 'url(static/');

            fs.writeFileSync('snapshot/public/index.html', content);
            await browser.close();
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node capture.js
        env:
          LOADED_SELECTOR: ""

      - name: Debug
        run: |
          echo "--- RESULT-ORDNER ---"
          find snapshot/public -maxdepth 4 -not -path '*/.*' | sort
          echo "---------------------"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: snapshot/public

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4