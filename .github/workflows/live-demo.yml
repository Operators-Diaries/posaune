name: Deploy Live Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Installationsskript starten
        run: |
          curl -fsSL https://raw.githubusercontent.com/Operators-Diaries/posaune/main/scripts/install.sh -o install.sh
          chmod +x install.sh
          # Falls dein Installer eine GUI-/X11-Umgebung erwartet:
          nohup xvfb-run --auto-servernum ./install.sh > app.log 2>&1 &

      - name: Auf Seite warten
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "Website is live"
              exit 0
            fi
            echo "Waiting for website..."
            sleep 5
          done

          echo "Website did not become available in time"
          echo "---- app.log ----"
          tail -n 200 app.log || true
          exit 1

      - name: Playwright installieren
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Seite spiegeln
        run: |
          mkdir -p snapshot

          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --directory-prefix=snapshot \
            http://127.0.0.1:5000/

      - name: HTMX Snapshot rendern
        run: |
          cat << 'EOF' > capture.js
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            await page.goto('http://127.0.0.1:5000/', {
              waitUntil: 'networkidle'
            });

            // HTMX fertig laden lassen
            await page.waitForTimeout(5000);

            const html = await page.content();

            fs.writeFileSync(
              'snapshot/127.0.0.1:5000/index.html',
              html.replace(
                /(src|href)="\/(?!\/)/g,
                '$1="'
              );
            );

            await browser.close();
          })();
          EOF

          node capture.js

      - name: Debug
        run: |
          echo "--- RESULT-ORDNER ---"
          find snapshot/127.0.0.1:5000 -maxdepth 4 -not -path '*/.*' | sort
          echo "---------------------"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: snapshot/127.0.0.1:5000

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4