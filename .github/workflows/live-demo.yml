name: Deploy Live Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages-snapshot
  cancel-in-progress: true

jobs:
  build-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install via remote script
        run: |
          curl -fsSL https://raw.githubusercontent.com/Operators-Diaries/posaune/main/scripts/install.sh -o install.sh
          chmod +x install.sh
          # Wir führen das Skript aus. Es wird wahrscheinlich einen Unterordner erstellen.
          nohup xvfb-run --auto-servernum ./install.sh > app.log 2>&1 &

      - name: Wait for local website
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "Website is live"
              sleep 5
              exit 0
            fi
            echo "Waiting for website..."
            sleep 10
          done
          echo "Website did not become available in time"
          exit 1

      - name: Install Playwright and Browser
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Mirror site into snapshot
        run: |
          mkdir -p snapshot/public

          # FIX: Suche dynamisch nach dem static-Ordner, egal wo das Skript ihn abgelegt hat
          STATIC_DIR=$(find . -name "static" -type d -not -path "*/.*" | head -n 1)
          if [ -n "$STATIC_DIR" ]; then
            echo "Gefundener static-Ordner: $STATIC_DIR"
            cp -r "$STATIC_DIR" snapshot/public/
          else
            echo "WARNUNG: Kein static-Ordner gefunden!"
          fi

          # Playwright Script für dynamisches HTML
          cat << 'EOF' > capture.js
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            
            // Zur lokalen Seite navigieren
            await page.goto('http://127.0.0.1:5000/', { waitUntil: 'networkidle' });
            
            // Sicherheitspuffer für HTMX-Injektionen
            await page.waitForTimeout(2000);

            let content = await page.content();
            
            // Pfad-Korrektur: Macht aus /static/... -> static/...
            // Das ist wichtig, damit GitHub Pages die Dateien im Unterordner findet.
            content = content.replace(/(src|href)="\/static\//g, '$1="static/');
            
            fs.writeFileSync('snapshot/public/index.html', content);
            await browser.close();
          })();
          EOF
          node capture.js

      - name: Debug Output (Folder Structure)
        run: |
          echo "--- STATISTIK DES RESULT-ORDNERS ---"
          find snapshot/public -maxdepth 3 -not -path '*/.*'
          echo "------------------------------------"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: snapshot/public

  deploy:
    needs: build-snapshot
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4