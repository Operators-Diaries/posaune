name: Deploy Live Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages-snapshot
  cancel-in-progress: true

jobs:
  build-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install via remote script
        run: |
          curl -fsSL https://raw.githubusercontent.com/Operators-Diaries/posaune/main/scripts/install.sh -o install.sh
          chmod +x install.sh
          nohup xvfb-run --auto-servernum ./install.sh > app.log 2>&1 &

      - name: Wait for local website
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "Website is live"
              sleep 5
              exit 0
            fi

            echo "Waiting for website..."
            sleep 5
          done

          echo "Website did not become available in time"
          exit 1

      - name: Mirror site into snapshot
        run: |
          mkdir -p snapshot/raw snapshot/public

          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --directory-prefix=snapshot/raw \
            http://127.0.0.1:5000/

          SITE_DIR="$(find snapshot/raw -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          test -n "$SITE_DIR"

          cp -a "$SITE_DIR"/. snapshot/public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: snapshot/public

  deploy:
    needs: build-snapshot
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4