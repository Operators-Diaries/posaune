name: Deploy Live Demo

on:
    push:
        branches: [ main ]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Repository auschecken
              uses: actions/checkout@v4

            - name: Python installieren
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'  
            - name: Abhängigkeiten installieren
              run: |
                pip install vpmobil pydantic-settings pyyaml flask 

            - name: Patch vpmobil vollständig
              run: |
                  python - <<'PY'
                  from pathlib import Path
                  import sysconfig
                  import re
  
                  base = Path(sysconfig.get_paths()["purelib"]) / "vpmobil"
  
                  for file in base.rglob("*.py"):
                      text = file.read_text(encoding="utf-8")
  
                      original = text
  
                      # 1️⃣ Problem: doppelte Quotes in f-strings (find("..."))
                      text = text.replace(
                          'find("Kopf/planart").text',
                          "find('Kopf/planart').text"
                      )
  
                      # 2️⃣ Problem: f-string mit verschachtelten Quotes wie:
                      # f"... {", ".join(...)} ..."
                      text = re.sub(
                          r'\{", "\.join\((.*?)\)\}',
                          r"{', '.join(\1)}",
                          text
                      )
  
                      # 3️⃣ Optional: weitere typische Fehler patterns
                      text = text.replace('"{", ".join', '"{\', \'.join')
  
                      if text != original:
                          file.write_text(text, encoding="utf-8")
                          print(f"Patched: {file}")
  
                  print("Patch abgeschlossen")
                  PY

            - name: Build-Ordner erstellen
              run: mkdir -p build

            - name: Flask Seite rendern
              run: python .github/workflows/build.py

            - name: Statische Dateien kopieren
              run: |
                cp -r static build/

            - name: Pages Artifact hochladen
              uses: actions/upload-pages-artifact@v3
              with:
                path: build

    deploy:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: GitHub Pages deployen
              uses: actions/deploy-pages@v4