name: Deploy Live Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages-snapshot
  cancel-in-progress: true

jobs:
  build-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install via remote script
        run: |
          curl -fsSL https://raw.githubusercontent.com/Operators-Diaries/posaune/main/scripts/install.sh -o install.sh
          chmod +x install.sh
          nohup xvfb-run --auto-servernum ./install.sh > app.log 2>&1 &

      - name: Wait for local website
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "Website is live"
              sleep 5
              exit 0
            fi

            echo "Waiting for website..."
            sleep 5
          done

          echo "Website did not become available in time"
          exit 1

      - name: Install Playwright and Browser
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Mirror site into snapshot
        run: |
          # 1. Ordnerstruktur vorbereiten
          mkdir -p snapshot/public

          # 2. Den statischen Content aus deinem Projekt kopieren
          # Ich nehme an, der Ordner heißt "static" im Hauptverzeichnis
          if [ -d "static" ]; then
            cp -r static snapshot/public/
          fi

          # 3. Playwright Script ausführen (für das dynamische HTML)
          cat << 'EOF' > capture.js
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            
            await page.goto('http://127.0.0.1:5000/');
            await page.waitForLoadState('networkidle');
            await page.waitForTimeout(1000);

            // Holen des gerenderten HTML (inkl. HTMX-Inhalt)
            let content = await page.content();
            
            // WICHTIGER FIX: Falls die Seite in einem Unterordner auf GitHub Pages liegt,
            // müssen wir absolute Pfade (/static/...) in relative (static/...) umwandeln.
            // Wenn deine Seite direkt unter der Hauptdomain läuft, kannst du das lassen, 
            // aber es schadet meistens nicht:
            content = content.replace(/href="\/static\//g, 'href="static/');
            content = content.replace(/src="\/static\//g, 'src="static/');

            fs.writeFileSync('snapshot/public/index.html', content);
            await browser.close();
          })();
          EOF
          node capture.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: snapshot/public


  deploy:
    needs: build-snapshot
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4