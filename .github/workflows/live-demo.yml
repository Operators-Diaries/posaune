name: Deploy Live Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pages-snapshot
  cancel-in-progress: true

jobs:
  build-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Install via remote script
        run: |
          curl -fsSL https://raw.githubusercontent.com/Operators-Diaries/posaune/main/scripts/install.sh -o install.sh
          chmod +x install.sh
          nohup xvfb-run --auto-servernum ./install.sh > app.log 2>&1 &

      - name: Wait for local website
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ >/dev/null; then
              echo "Website is live"
              exit 0
            fi
            echo "Waiting for website..."
            sleep 5
          done

          echo "Website did not become available in time"
          exit 1

      - name: Mirror local assets
        run: |
          mkdir -p snapshot/public
          wget \
            --mirror \
            --page-requisites \
            --convert-links \
            --adjust-extension \
            --no-parent \
            --no-host-directories \
            --directory-prefix=snapshot/public \
            http://127.0.0.1:5000/

      - name: Render final HTMX DOM
        run: |
          cat > render.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs/promises';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage();

          await page.addInitScript(() => {
            window.__htmxPending = 0;
            window.__htmxLastChange = Date.now();

            const mark = () => {
              window.__htmxLastChange = Date.now();
            };

            document.addEventListener('htmx:beforeRequest', () => {
              window.__htmxPending += 1;
              mark();
            });

            document.addEventListener('htmx:afterRequest', () => {
              window.__htmxPending = Math.max(0, window.__htmxPending - 1);
              mark();
            });

            document.addEventListener('htmx:afterSwap', mark);
            document.addEventListener('htmx:afterSettle', mark);
          });

          await page.goto('http://127.0.0.1:5000/', { waitUntil: 'domcontentloaded' });

          await page.waitForFunction(() => {
            return window.__htmxPending === 0 && (Date.now() - window.__htmxLastChange) > 5000;
          }, null, { timeout: 120000 });

          await fs.writeFile('snapshot/public/index.html', await page.content());
          await browser.close();
          EOF

          node render.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: snapshot/public

  deploy:
    needs: build-snapshot
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4